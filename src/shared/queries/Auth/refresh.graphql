query refreshUser($data: String!){
  refreshUser(data: $data){
    access_token,
    expiresAt,
    user{
      id
      email
      username
      language
      createdAt
      watch{
        id,
        serialNum
        brand
        model
        referenceNumber
        yearOfProduction
        imageUrl
        metadataURI
        certificateUrl
        ownerId
        lastSynced
      },
    }
  }
}

query getWatches($where: WatchWhereInput!) {
  watches(where: $where) {
    id
    serialNum
    metadataURI
    certificateUrl
    tokenId
    txHash
    mintStatus
    basescanTxUrl
    ownerId
    lastSynced
    user {
      id
      username
      email
      walletAddress
      createdAt
      language
    }
    ownershipLog {
      id
      watchId
      ownerId
      timestamp
    }
  }
}

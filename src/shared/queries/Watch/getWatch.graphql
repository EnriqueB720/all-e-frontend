query getWatch($where: WatchWhereInput!) {
  watch(where: $where) {
    id
    serialNum
    brand
    model
    referenceNumber
    yearOfProduction
    imageUrl
    metadataURI
    certificateUrl
    ownerId
    lastSynced
    user {
      id
      username
      email
      createdAt
      language
    }
    ownershipLog {
      id
      watchId
      ownerId
      timestamp
      metadataURI
      certificateUrl
      owner {
        id
        username
      }
    }
  }
}
